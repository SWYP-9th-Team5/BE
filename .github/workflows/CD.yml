name: CD (docker -> EC2)

on:
  pull_request:
    branches: [ "develop" ]
  push:
    branches: [ "develop", "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Gradle
        run: ./gradlew clean bootJar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build the Docker image
        run: docker build -t "${{ secrets.DOCKERHUB_USERNAME }}/greening" .

      - name: Push Docker image to Docker Hub
        run: docker push "${{ secrets.DOCKERHUB_USERNAME }}/greening"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            fuser -k 8080/tcp || true
            
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p${{ secrets.DOCKERHUB_TOKEN }}
            docker stop ${{ secrets.DOCKERHUB_USERNAME }}/greening
            docker container prune -f
            docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/greening:latest
            
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/greening
            docker run -d --name greening -p 8080:8080 \
              -e "DB_URL=${{ secrets.DB_URL }}" \
              -e "DB_USERNAME=${{ secrets.DB_USERNAME }}" \
              -e "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
              -e "JWT_ACCESS_EXPIRY=${{ secrets.JWT_ACCESS_EXPIRY }}" \
              -e "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
              -e "KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}" \
              -e "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e "S3_REGION=${{ secrets.S3_REGION }}" \
              -e "S3_BUCKET=${{ secrets.S3_BUCKET }}" \
              -e "S3_STORAGE_ACCESS_KEY=${{ secrets.S3_STORAGE_ACCESS_KEY }}" \
              -e "S3_STORAGE_SECRET_KEY=${{ secrets.S3_STORAGE_SECRET_KEY }}" \
              -e "S3_BASE_URL=${{ secrets.S3_BASE_URL }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/greening
