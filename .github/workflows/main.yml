name: CI/CD (docker -> ncp)

on:
  push:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Gradle
        run: ./gradlew clean bootJar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build the Docker image
        run: docker build -t "${{ secrets.DOCKERHUB_USERNAME }}/greening:test" .

      - name: Push Docker image to Docker Hub
        run: docker push "${{ secrets.DOCKERHUB_USERNAME }}/greening:test"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to NCP via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USER }}
          key: ${{ secrets.NCP_SSH_KEY }}
          script: |
            fuser -k 8080/tcp || true
            
            docker rm -f $(docker ps -aq) || true
            docker rmi -f $(docker images -q) || true
            
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/greening:test
            docker run -d --name greening -p 8080:8080 \
              -e "DB_URL=${{ secrets.DB_URL }}" \
              -e "DB_USERNAME=${{ secrets.DB_USERNAME }}" \
              -e "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
              -e "JWT_ACCESS_EXPIRY=${{ secrets.JWT_ACCESS_EXPIRY }}" \
              -e "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
              -e "KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}" \
              -e "KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}" \
              -e "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e "GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}" \
              -e "NCP_BUCKET=${{ secrets.NCP_BUCKET }}" \
              -e "NCP_STORAGE_ACCESS_KEY=${{ secrets.NCP_STORAGE_ACCESS_KEY }}" \
              -e "NCP_STORAGE_SECRET_KEY=${{ secrets.NCP_STORAGE_SECRET_KEY }}" \
              -e "NCP_BASE_URL=${{ secrets.NCP_BASE_URL }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/greening:test
