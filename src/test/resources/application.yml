spring:
  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
    properties:
      hibernate:
        show_sql: true
        format_sql: true

jwt:
  access-expiry-time: ${JWT_ACCESS_EXPIRY}
  client-secret: ${JWT_SECRET}

oauth:
  kakao:
    token_base_url: https://kauth.kakao.com/oauth/token
    user_info_base_url: https://kapi.kakao.com/v2/user/me
    security:
      client_id: ${KAKAO_CLIENT_ID}
      grant_type: authorization_code
      redirect_uri: ${KAKAO_REDIRECT_URI}
  google:
    token_base_url: https://oauth2.googleapis.com/token
    user_info_base_url: https://www.googleapis.com/oauth2/v2/userinfo
    security:
      client_id: ${GOOGLE_CLIENT_ID}
      client_secret: ${GOOGLE_CLIENT_SECRET}
      grant_type: authorization_code
      redirect_uri: ${GOOGLE_REDIRECT_URI}

ncp:
  storage:
    region: kr-standard
    bucket: ${NCP_BUCKET}
    end-point: https://kr.object.ncloudstorage.com
    access-key: ${NCP_STORAGE_ACCESS_KEY}
    secret-key: ${NCP_STORAGE_SECRET_KEY}
    base-url: ${NCP_BASE_URL}